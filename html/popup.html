<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Work Timer</title>
    <link rel="stylesheet" href="../css/popup.css" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <main>
      <h1>Gig Timer</h1>
      <label for="project">Select Project</label>
      <select
        class="projectSelect"
        id="projectSelect"
        name="projectSelect"
      ></select>
      <form class="projectForm" id="projectForm">
        <h2>New Project</h2>
        <div class="defaultFields" id="defaultFields">
          <div class="inputGroup">
            <label>Id</label>
            <input type="text" name="idInput" />
          </div>
        </div>
      </form>
    </main>
    <script src="../js/popup.js"></script>
  </body>
</html>
