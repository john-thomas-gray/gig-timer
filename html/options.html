<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Work Log Options</title>
    <style>
      .form-group {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Configure Work Log</h1>
    <h2>Project</h2>
    <form id="projectForm">
      <div id="defaultFields">
        <div class="form-group">
          <label for="title-input">Title</label>
          <input type="text" id="titleInput" name="titleInput"/>
        </div>
      </div>
      <div id="customFields">
        <h3>Add Custom Fields</h3>
        <div class="form-group">
          <input type="text" id="addField" name="addField">
          <button type="button" id="addButton">Add Field</button>
        </div>
      </div>
    </form>
    <script type="module" src="optionsForm.js">
    </script>
  </body>
</html>
